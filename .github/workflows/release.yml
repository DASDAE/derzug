name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Build distributions
        run: uv build

      - name: Check distribution metadata
        run: uv run --isolated --no-project --with twine twine check dist/*

      - name: Smoke test wheel
        run: |
          uv venv --python 3.12 .venv-wheel-smoke
          uv pip install --python .venv-wheel-smoke/bin/python --no-deps dist/*.whl
          .venv-wheel-smoke/bin/python -c "from derzug.version import __version__; print(__version__)"
          .venv-wheel-smoke/bin/python -m derzug.cli --help

      - name: Smoke test sdist
        run: |
          uv venv --python 3.12 .venv-sdist-smoke
          uv pip install --python .venv-sdist-smoke/bin/python --no-deps dist/*.tar.gz
          .venv-sdist-smoke/bin/python -c "from derzug.version import __version__; print(__version__)"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/*

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Publish to TestPyPI
        run: uv publish --index testpypi dist/*

  publish-pypi:
    runs-on: ubuntu-latest
    needs: publish-testpypi
    if: ${{ !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b') && !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'dev') }}
    environment:
      name: pypi

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Publish to PyPI
        run: uv publish dist/*
