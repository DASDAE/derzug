# Upload to PyPI when a release is published.
name: Release
on:
  release:
    types:
      - published

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: "true"
          fetch-depth: "0"

      - uses: ./.github/actions/load-shared-vars

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: create dists
        shell: bash
        env:
          EXPECTED_VERSION: ${{ github.event.release.tag_name }}
        run: |
          expected="${EXPECTED_VERSION#v}"
          python -m pip install --upgrade pip build
          git describe --tags --dirty --always
          # Release versioning must come from a clean tagged checkout.
          test -z "$(git status --porcelain)" || { git status --short; exit 1; }
          python -m build
          # Reject local-version/dirty artifacts and require the release tag version.
          ls dist
          compgen -G "dist/*+*" > /dev/null && exit 1
          compgen -G "dist/*dirty*" > /dev/null && exit 1
          compgen -G "dist/*-${expected}*" > /dev/null

      - name: publish package
        uses: pypa/gh-action-pypi-publish@release/v1
