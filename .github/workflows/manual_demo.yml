name: Interactive Demo (noVNC)

# Runs automatically when a PR is labeled "demo", or can be triggered manually.
# The noVNC URL is printed in the "Print session URL" step of the job log.
# Access requires the MANUAL_DEMO_PASSWORD Actions secret.
# Cancel the workflow run to end the session early.
on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      timeout_minutes:
        description: "Session timeout in minutes (max 350)"
        default: "30"
        required: false

jobs:
  demo:
    runs-on: ubuntu-latest
    # Hard cap slightly under GitHub Actions' 360-minute limit
    timeout-minutes: 355
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'demo')

    env:
      DISPLAY: ":99"
      QT_QPA_PLATFORM: xcb

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: "true"
          fetch-depth: "0"

      - uses: ./.github/actions/mamba-install-derzug
        with:
          python-version: "3.13"
          cache-number: 3

      - name: Install display, VNC, and window manager
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb x11vnc novnc openbox

      - name: Download cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o cloudflared
          chmod +x cloudflared

      - name: Start virtual display and window manager
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 1
          DISPLAY=:99 openbox &
          sleep 1

      - name: Start VNC server
        env:
          MANUAL_DEMO_PASSWORD: ${{ secrets.MANUAL_DEMO_PASSWORD }}
        run: |
          if [ -z "$MANUAL_DEMO_PASSWORD" ]; then
            echo "ERROR: MANUAL_DEMO_PASSWORD secret is not configured."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP"
          x11vnc -storepasswd "$MANUAL_DEMO_PASSWORD" "$RUNNER_TEMP/x11vnc.pass" >/dev/null
          x11vnc -display :99 -rfbauth "$RUNNER_TEMP/x11vnc.pass" -listen localhost -xkb -forever -shared &
          sleep 1

      - name: Start noVNC websocket proxy
        run: |
          websockify --web /usr/share/novnc 6080 localhost:5900 &
          sleep 1

      - name: Start cloudflare tunnel
        run: |
          ./cloudflared tunnel --url http://localhost:6080 > /tmp/cf.log 2>&1 &
          # Wait up to 30 s for the public URL to appear
          for i in $(seq 1 15); do
            BASE_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/cf.log | head -1)
            [ -n "$BASE_URL" ] && break
            sleep 2
          done
          if [ -z "$BASE_URL" ]; then
            echo "ERROR: cloudflare tunnel URL did not appear in time."
            cat /tmp/cf.log
            exit 1
          fi
          echo "CF_BASE_URL=$BASE_URL" >> "$GITHUB_ENV"

      - name: Launch DerZug
        shell: bash -el {0}
        run: |
          derzug --demo --dev &
          sleep 5

      - name: Print session URL
        run: |
          echo "Session URL: $CF_BASE_URL/vnc.html?autoconnect=true"
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║            DerZug Interactive Demo Session                  ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  Open this URL in your browser:                              ║"
          echo "║                                                              ║"
          echo "║  $CF_BASE_URL/vnc.html?autoconnect=true"
          echo "║                                                              ║"
          echo "║  Resolution : 1920 × 1080                                   ║"
          echo "║  Password   : use the MANUAL_DEMO_PASSWORD repo secret      ║"
          TIMEOUT_MINS="${{ github.event.inputs.timeout_minutes }}"
          echo "║  Ends in    : ${TIMEOUT_MINS:-30} minutes (or cancel this run)               ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

      - name: Keep session alive
        run: |
          TIMEOUT_MINS="${{ github.event.inputs.timeout_minutes }}"
          TIMEOUT_SECS=$(( ${TIMEOUT_MINS:-30} * 60 ))
          END=$(( $(date +%s) + TIMEOUT_SECS ))
          while [ $(date +%s) -lt $END ]; do
            REMAINING=$(( (END - $(date +%s)) / 60 ))
            echo "Session active — ${REMAINING} minute(s) remaining. Cancel workflow to end early."
            sleep 60
          done
          echo "Timeout reached. Session closed."
