<?xml version="1.0" encoding="UTF-8"?>
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Writing lines -->
  <line x1="14" y1="38" x2="43" y2="38"
        stroke="#333333" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="43" x2="32" y2="43"
        stroke="#333333" stroke-width="2" stroke-linecap="round"/>
  <!-- Pencil: eraser top-right, tip bottom-left -->
  <g transform="rotate(135, 24, 24)">
    <!-- Eraser -->
    <rect x="5" y="20" width="4" height="8"
          fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
    <!-- Ferrule (metal band) -->
    <rect x="9" y="20" width="4" height="8"
          fill="#333333"/>
    <!-- Body -->
    <rect x="13" y="20" width="23" height="8"
          fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
    <!-- Tip -->
    <polygon points="36,20 42,24 36,28"
             fill="#333333"/>
  </g>
</svg>
