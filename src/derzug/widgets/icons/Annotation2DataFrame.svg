<?xml version="1.0" encoding="UTF-8"?>
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Writing lines (bottom-left, near pencil tip) -->
  <line x1="2" y1="40" x2="20" y2="40" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2" y1="44" x2="13" y2="44" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pencil (same style as Annotations.svg, rotated around left-half center) -->
  <g transform="rotate(135, 12, 24)">
    <rect x="2"  y="20" width="4"  height="8" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
    <rect x="6"  y="20" width="3"  height="8" fill="#333333"/>
    <rect x="9"  y="20" width="12" height="8" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
    <polygon points="21,20 27,24 21,28" fill="#333333"/>
  </g>
  <!-- Arrow → -->
  <polygon points="24,20 30,24 24,28" fill="#333333"/>
  <!-- Small table (right side) -->
  <rect x="30" y="10" width="16" height="26" rx="2" fill="#ffffff" stroke="#333333" stroke-width="2"/>
  <rect x="31.2" y="11.2" width="13.6" height="6.5" fill="#333333"/>
  <line x1="30" y1="25" x2="46" y2="25" stroke="#333333" stroke-width="1.2"/>
  <line x1="30" y1="31" x2="46" y2="31" stroke="#333333" stroke-width="1.2"/>
  <line x1="38" y1="11" x2="38" y2="36" stroke="#333333" stroke-width="1.2"/>
</svg>
